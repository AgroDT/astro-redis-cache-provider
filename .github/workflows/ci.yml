name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, Lint, Check, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Build, Lint, Check, Test
        uses: ./.github/actions/run-verification-suite

      - name: Upload test report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() && hashFiles('junit.xml') != '' }}
        with:
          name: Tests
          path: junit.xml
          reporter: java-junit

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        if: ${{ !cancelled() && hashFiles('lcov.info') != '' }}
        with:
          format: lcov
          file: lcov.info
